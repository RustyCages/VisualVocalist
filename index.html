<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Visual Vocalist | Choirstudio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --orange: #FF5532;
            --dark: #191919;
            --gray: #A0A0A0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: relative;
            width: 100vw;
            height: 75vh;
            cursor: crosshair;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
        }

        /* "Nu-linjen" (Siktet) */
        .playhead-line {
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3), transparent);
            position: relative;
        }

        .playhead-marker {
            position: absolute;
            top: 10px;
            width: 0; 
            height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid var(--orange);
            left: -9px;
        }

        #controls {
            height: 25vh;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 2px solid #333;
        }

        .btn-play {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background-color: var(--orange);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(255, 85, 50, 0.3);
        }

        .btn-play:hover {
            background-color: #ff6a4d;
            transform: scale(1.05);
        }

        .status-text {
            margin-top: 10px;
            color: var(--gray);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="vocalCanvas"></canvas>
        <div id="ui-layer">
            <div class="playhead-line">
                <div class="playhead-marker"></div>
            </div>
        </div>
    </div>

    <div id="controls">
        <button id="playBtn" class="btn-play">STARTA STÄMMA</button>
        <div id="status" class="status-text">Laddar stämma från Supabase...</div>
    </div>

    <script>
        // --- CONFIG ---
        const SB_URL = "https://pqfrzamdhdicefgbwruo.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxZnJ6YW1kaGRpY2VmZ2J3cnVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNjc1NzgsImV4cCI6MjA4OTg0MzU3OH0.b3nM0icWc0ViSjJ3pZk-ajE7l0BK8mE803E1TSauqtc";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        const canvas = document.getElementById('vocalCanvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const statusText = document.getElementById('status');

        let pitchData = [];
        let isPlaying = false;
        let audio = new Audio('din_stamma.mp3'); // Denna bör också matchas mot Supabase-id

        // Inställningar för visning
        const pixelsPerSecond = 180;
        const pitchScale = 25; 

        // 1. Ladda data från Supabase
        async function init() {
            const { data, error } = await supabase
                .from('stammor')
                .select('*')
                .limit(1) // Vi tar första bästa för testet
                .single();

            if (error) {
                statusText.innerText = "Error: Kunde inte ladda data.";
                console.error(error);
            } else {
                pitchData = data.pitch_data;
                statusText.innerText = `Låt: ${data.song_title} (${data.voice_part})`;
            }
        }

        // 2. Canvas-rendering
        function render() {
            // Rensa canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isPlaying) {
                const now = audio.currentTime;
                const centerX = canvas.width / 2;

                pitchData.forEach(point => {
                    // Beräkna position
                    const x = centerX + (point.time - now) * pixelsPerSecond;
                    const y = canvas.height - (point.pitch - 50) * pitchScale;

                    // Rita bara om det är inom skärmen (prestanda)
                    if (x > -50 && x < canvas.width + 50) {
                        const isActive = Math.abs(point.time - now) < 0.05;
                        
                        // Rita "noten" / ordet
                        ctx.fillStyle = isActive ? "#FFFFFF" : "rgba(160, 160, 160, 0.4)";
                        ctx.font = isActive ? "bold 30px Arial" : "20px Arial";
                        
                        // Om point.text finns, rita den, annars en prick
                        if (point.text) {
                            ctx.fillText(point.text, x, y);
                        } else {
                            ctx.beginPath();
                            ctx.arc(x, y, isActive ? 8 : 5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                });
            }
            requestAnimationFrame(render);
        }

        // 3. Kontroller
        playBtn.onclick = () => {
            if (!isPlaying) {
                audio.play();
                isPlaying = true;
                playBtn.innerText = "PAUSA";
            } else {
                audio.pause();
                isPlaying = false;
                playBtn.innerText = "FORTSÄTT";
            }
        };

        // Responsiv canvas
        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight * 0.75;
        };

        // Starta allt
        window.onresize();
        init();
        render();

    </script>
</body>
</html>
